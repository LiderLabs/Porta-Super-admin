<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porta Superadmin</title>
  <link rel="icon" type="image/png" href="/Porta_fav.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { background: #0d1117; min-height: 100vh; }
    body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; }
    #splash {
      position: fixed; inset: 0;
      background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px; z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
    #splash img { height: 52px; width: auto; animation: logoIn 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-bar-wrap { width: 160px; height: 3px; background: #21262d; border-radius: 99px; overflow: hidden; animation: logoIn 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) both; }
    .splash-bar { height: 100%; background: #3fb950; border-radius: 99px; animation: load 1.6s cubic-bezier(0.4,0,0.2,1) forwards; }
    @keyframes load { 0%{width:0%} 40%{width:60%} 70%{width:80%} 100%{width:100%} }
  </style>
</head>
<body>
  <div id="splash">
    <img src="/Porta.png" alt="Porta" />
    <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    const observer = new MutationObserver(() => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        const splash = document.getElementById('splash');
        if (splash) { splash.classList.add('fade-out'); setTimeout(() => splash.remove(), 420); }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
  </script>
</body>
</html>
